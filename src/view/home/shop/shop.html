<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GlowCare | Radiant Skincare</title>
    <link rel="stylesheet" href="/shop/styles.css" />
  </head>
  <body>
    <header class="navbar glass">
      <div class="logo">GlowCare</div>
      <nav class="nav-links">
        <a href="/home">Home</a>
        <a href="#">Shop</a>
        <a href="#">Blog</a>
        <a href="#">About</a>
      </nav>

      <div class="nav-actions">
        <div class="auth-buttons">
          <a href="/signin" class="btn-outline">Sign In | </a>
          <a href="/register" class="btn-primary-sm">Register</a>
        </div>
      </div>
    </header>

    <!-- ======= SHOP BODY ======= -->
    <main class="shop-main">
      <!-- SIDEBAR FILTERS -->
      <aside class="sidebar">
        <div class="sidebar-section">
          <h3 class="sidebar-title">Skin Type</h3>
          <label class="filter-option">
            <input
              type="radio"
              name="category"
              value=""
              checked
              onchange="applyFilters()"
            />
            <span>All Types</span>
          </label>
          <label class="filter-option">
            <input
              type="radio"
              name="category"
              value="serums"
              onchange="applyFilters()"
            />
            <span>SERUMS</span>
          </label>
          <label class="filter-option">
            <input
              type="radio"
              name="category"
              value="moisturizers"
              onchange="applyFilters()"
            />
            <span>moisturizers</span>
          </label>
          <label class="filter-option">
            <input
              type="radio"
              name="category"
              value="cleansers"
              onchange="applyFilters()"
            />
            <span>cleansers</span>
          </label>
          <label class="filter-option">
            <input
              type="radio"
              name="category"
              value="masks"
              onchange="applyFilters()"
            />
            <span>MASKS</span>
          </label>
          <label class="filter-option">
            <input
              type="radio"
              name="category"
              value="sunscreen"
              onchange="applyFilters()"
            />
            <span>SUNSCREEN</span>
          </label>
          <label class="filter-option">
            <input
              type="radio"
              name="category"
              value="eyecare"
              onchange="applyFilters()"
            />
            <span>EYECARE</span>
          </label>
        </div>

        <button class="reset-btn" onclick="resetFilters()">
          Reset Filters
        </button>
      </aside>

      <!-- PRODUCTS AREA -->
      <section class="products-section">
        <div class="products-header">
          <h2 class="section-heading">Our Products</h2>
          <span class="products-count" id="products-count"></span>
        </div>

        <!-- Grid بتتملى بـ JS -->
        <div class="products-grid" id="products-grid">
          <div class="loading-state">
            <div class="spinner"></div>
            <p>Loading products...</p>
          </div>
        </div>
      </section>
    </main>

    <script>
      // ============================================
      // CONFIG — غير الـ URL لـ API بتاعك
      // ============================================

      const urlParams = new URLSearchParams(window.location.search);
      const category = urlParams.get("category");

      const API_BASE = "/api/v1/products";

      let allProducts = [];

      // ============================================
      // جيب المنتجات من MongoDB Atlas عبر الـ API
      // ============================================
      /*async function fetchProducts() {
        try {
          const res = await fetch(API_BASE);
          if (!res.ok) throw new Error("Server error");
          const data = await res.json();
          allProducts = data.data; // يتعامل مع { data: [...] } أو [...]
          renderProducts(allProducts);
          /////////////////////////////
          console.log("RAW RESPONSE:", data);
          console.log("DATA.DATA:", data.data);
        } catch (err) {
          document.getElementById("products-grid").innerHTML = `
          <div class="error-state">
            <p>⚠️ Could not load products.<br><small>${err.message}</small></p>
          </div>`;
        }
      }*/

      //fetch products + apply filter
      async function fetchProducts(query = "") {
        try {
          const res = await fetch(`/api/v1/products${query}`);
          const data = await res.json();

          allProducts = data.data;
          renderProducts(allProducts);
        } catch (err) {
          document.getElementById("products-grid").innerHTML =
            `<p>⚠️ Error loading products</p>`;
        }
      }

      window.onload = () => {
        if (category) {
          fetchProducts(`?category=${category}`);
        } else {
          fetchProducts();
        }

        updateCartBadge();
      };
      // ============================================
      // رسم الكروت
      // ============================================
      function renderProducts(products) {
        const grid = document.getElementById("products-grid");
        const countEl = document.getElementById("products-count");

        if (!products.length) {
          grid.innerHTML = `<div class="empty-state"><p>No products found 🌸</p></div>`;
          countEl.textContent = "0 products";
          return;
        }

        countEl.textContent = `${products.length} product${products.length !== 1 ? "s" : ""}`;

        grid.innerHTML = products
          .map(
            (p, i) => `
        <div class="product-card" style="animation-delay:${i * 0.07}s">
          <div class="card-img-wrap">
            <img
              src="${p.image || p.imageUrl || ""}"
              alt="${p.name}"
              onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
            />
            <div class="img-placeholder">🌸</div>
          </div>
          <div class="card-body">
            ${p.skinType ? `<span class="skin-badge ${p.skinType}">${capitalize(p.skinType)}</span>` : ""}
            <h4 class="card-name">${p.name}</h4>
            <p class="card-desc">${p.description || ""}</p>
            <div class="card-footer">
              <span class="card-price">$${Number(p.price).toFixed(2)}</span>
              <button class="add-btn" onclick="addToCart(this, '${p._id}', '${escHtml(p.name)}')">
                      Add to Cart
                    </button>
            </div>
          </div>
        </div>
      `,
          )
          .join("");
      }

      // ============================================
      // فلترة محلية (بعد ما البيانات تتحمّل)
      // ============================================

      /* function applyFilters() {
        const skinType =
          document.querySelector('input[name="skinType"]:checked')?.value || "";
        const minPrice =
          parseFloat(document.getElementById("minPrice").value) || 0;
        const maxPrice =
          parseFloat(document.getElementById("maxPrice").value) || Infinity;

        const filtered = allProducts.filter((p) => {
          const matchSkin = !skinType || p.skinType === skinType;
          const price = Number(p.price);
          const matchPrice = price >= minPrice && price <= maxPrice;
          return matchSkin && matchPrice;
        });

        renderProducts(filtered);
      }*/

      //updated apply filters
      function applyFilters() {
        const category =
          document.querySelector('input[name="category"]:checked')?.value || "";

        let query = "?";

        if (category) query += `category=${category}&`;
        fetchProducts(query);
      }

      function updateSlider(val) {
        document.getElementById("sliderVal").textContent = `$${val}`;
        document.getElementById("maxPrice").value = val;

        applyFilters();
      }

      function resetFilters() {
        document.querySelector('input[name="category"][value=""]').checked =
          true;

        fetchProducts(); // يرجع كل المنتجات
      }

      // ============================================
      // Helpers
      // ============================================
      function capitalize(s) {
        return s ? s.charAt(0).toUpperCase() + s.slice(1) : "";
      }
      function escHtml(s) {
        return s.replace(/'/g, "\\'");
      }

      //ِAdd to cart redirect
      async function addToCart(btn, productId, name) {
        const token = localStorage.getItem("token");

        if (!token) {
          alert("Please login first");
          return;
        }

        try {
          const res = await fetch("http://localhost:5000/api/cart/add", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: "Bearer " + token,
            },
            body: JSON.stringify({
              productId,
              quantity: 1,
            }),
          });

          const data = await res.json();

          if (!res.ok) {
            alert(data.message || "Error");
            return;
          }

          btn.textContent = "✓ Added!";
          btn.style.background = "#c06090";

          updateCartBadge();

          setTimeout(() => {
            window.location.href = "/src/view/home/cart.html";
          }, 1000);
        } catch (err) {
          console.error(err);
          alert("Server error");
        }
      }
      async function updateCartBadge() {
        try {
          const res = await fetch("http://localhost:5000/api/cart", {
            headers: {
              Authorization: "Bearer " + localStorage.getItem("token"),
            },
          });

          const data = await res.json();

          const count =
            data?.items?.reduce((sum, i) => sum + i.quantity, 0) || 0;

          const badge = document.getElementById("cart-badge");

          if (badge) {
            badge.textContent = count;
            badge.classList.toggle("visible", count > 0);
          }
        } catch (err) {
          console.log("Cart badge error:", err);
        }
      }

      fetchProducts();
    </script>
  </body>
</html>
